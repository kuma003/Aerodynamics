name: Build aero.pdf

on:
  push:
    branches:
      - main
    paths:
      - aero.tex
      - aero/**
      - pages/**
      - .github/workflows/build-aero.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install upLaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            latexmk \
            texlive-fonts-extra \
            texlive-lang-japanese \
            texlive-latex-extra \
            texlive-science

      - name: Build aero.pdf
        run: |
          mkdir --parents build
          latexmk -pdfdvi \
            -outdir=build \
            -interaction=nonstopmode \
            -halt-on-error \
            -file-line-error \
            -e '$latex = "uplatex %O %S"' \
            -e '$bibtex = "pbibtex %O %S"' \
            -e '$dvipdf = "dvipdfmx %O -o %D %S"' \
            aero.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: aero-pdf
          path: build/aero.pdf
          if-no-files-found: error
          retention-days: 90

      - name: Prepare GitHub Pages site
        run: |
          mkdir --parents site
          cp build/aero.pdf site/aero.pdf
          cp pages/index.html site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
