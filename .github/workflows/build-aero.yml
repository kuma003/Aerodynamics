name: Build and publish PDFs

on:
  push:
    branches:
      - main
    paths:
      - "*.tex"
      - aero/**
      - Barrowman/**
      - damping_moment/**
      - wall_function/**
      - pages/**
      - .github/workflows/build-aero.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install upLaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            latexmk \
            texlive-fonts-extra \
            texlive-lang-japanese \
            texlive-latex-extra \
            texlive-science

      - name: Build PDFs
        run: |
          mkdir --parents build
          documents=(
            aero.tex
            aero_en.tex
            Barrowman_method.tex
            damping_moment.tex
            wall_function.tex
          )
          for document in "${documents[@]}"; do
            latexmk -pdfdvi \
              -outdir=build \
              -interaction=nonstopmode \
              -halt-on-error \
              -file-line-error \
              -e '$latex = "uplatex %O %S"' \
              -e '$bibtex = "pbibtex %O %S"' \
              -e '$dvipdf = "dvipdfmx %O -o %D %S"' \
              "$document"
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aerodynamics-pdfs
          path: build/*.pdf
          if-no-files-found: error
          retention-days: 90

      - name: Prepare GitHub Pages site
        run: |
          mkdir --parents site
          cp build/*.pdf site/
          cp pages/index.html site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
